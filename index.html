const bbox = DATA.meta.bbox;
const PAD = 0.003;
const W = bbox[0]-PAD, S = bbox[1]-PAD, E = bbox[2]+PAD, N = bbox[3]+PAD;
const cosLat = Math.cos((S+N)/2 * Math.PI/180);
const VW = 1000;
const lngSpan = (E-W)*cosLat, latSpan = N-S;
const VH = VW * latSpan / lngSpan;
function project(lng,lat){return [((lng-W)*cosLat/lngSpan)*VW, ((N-lat)/latSpan)*VH];}

const svg = document.getElementById('mapsvg');
const NS = "http://www.w3.org/2000/svg";
let view = {tx:0,ty:0,scale:1};
function applyT(){const g=svg.querySelector('g.world');if(g)g.setAttribute('transform',`translate(${view.tx} ${view.ty}) scale(${view.scale})`);}

function buildMap(){
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  const g = document.createElementNS(NS,'g');
  g.setAttribute('class','world');
  const colorOf = {};
  DATA.VILLAGES.forEach(v => colorOf[v.name] = v.color);
  // village polygons
  DATA.GEOJSON.features.forEach(f => {
    const name = f.properties.VILLNAME;
    const wrap = document.createElementNS(NS,'g');
    wrap.setAttribute('class','village');
    wrap.dataset.name = name;
    const color = colorOf[name] || '#f4d4c8';
    const rings = f.geometry.type==='Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;
    rings.forEach(poly => {
      const path = document.createElementNS(NS,'polygon');
      path.setAttribute('points', poly[0].map(([lng,lat])=>project(lng,lat).join(',')).join(' '));
      path.setAttribute('fill', color);
      path.setAttribute('stroke', '#7a5a3a');
      path.setAttribute('stroke-width', '0.6');
      path.setAttribute('stroke-linejoin', 'round');
      wrap.appendChild(path);
    });
    wrap.addEventListener('click', e => {e.stopPropagation(); selectV(name);});
    g.appendChild(wrap);
  });
  // 道路圖層
  const STROKE = {1:'#a83d1f',2:'#c66a2e',3:'#b08a4a',4:'#a89570',5:'#b8a888'};
  const WIDTH = {1:3.2,2:2.6,3:2.0,4:1.4,5:1.0};
  const CASING = {1:5.2,2:4.4,3:3.6,4:2.6,5:1.8};
  const roadsG = document.createElementNS(NS,'g');
  roadsG.setAttribute('class','roads');
  roadsG.id = 'roads-layer';
  for (const r of (DATA.ROADS||[])){
    const lv = r.level||5;
    const pts = r.coords.map(([lng,lat])=>project(lng,lat).join(',')).join(' ');
    const c = document.createElementNS(NS,'polyline');
    c.setAttribute('points', pts); c.setAttribute('fill','none');
    c.setAttribute('stroke','#fbf6ee'); c.setAttribute('stroke-width', CASING[lv]);
    c.setAttribute('stroke-linecap','round'); c.setAttribute('stroke-linejoin','round');
    roadsG.appendChild(c);
  }
  for (const r of (DATA.ROADS||[])){
    const lv = r.level||5;
    const pts = r.coords.map(([lng,lat])=>project(lng,lat).join(',')).join(' ');
    const ln = document.createElementNS(NS,'polyline');
    ln.setAttribute('points', pts); ln.setAttribute('fill','none');
    ln.setAttribute('stroke', STROKE[lv]); ln.setAttribute('stroke-width', WIDTH[lv]);
    ln.setAttribute('stroke-linecap','round'); ln.setAttribute('stroke-linejoin','round');
    roadsG.appendChild(ln);
  }

  // 道路 label: 用「路名」分組(不是 label,讓不同段都能標)
  // 每條 NAMED 路把同名段全部 segment 收集起來,然後做標籤聚類:
  //   同名段內,投影距離超過 MIN_GAP 才算另一個 cluster (避免長路只標一次)
  const ROAD_LABEL_MIN_GAP = 200;  // svg-units; ~ 200 m 在原始 scale 下
  const segsByName = {};
  for (const r of (DATA.ROADS||[])){
    const nm = r.name || '';
    if (!nm) continue;
    if (!segsByName[nm]) segsByName[nm] = {ref:r.ref||'', highway:r.highway||'', level:r.level||5, segs:[]};
    for (let i=0; i<r.coords.length-1; i++){
      const [x1,y1] = project(...r.coords[i]);
      const [x2,y2] = project(...r.coords[i+1]);
      const L = Math.hypot(x2-x1, y2-y1);
      let ang = Math.atan2(y2-y1, x2-x1) * 180/Math.PI;
      if (ang > 90) ang -= 180;
      if (ang < -90) ang += 180;
      segsByName[nm].segs.push({mx:(x1+x2)/2, my:(y1+y2)/2, len:L, ang});
    }
  }

  // v0.16: 兩階段放置 — (1) per-name greedy 壓掉同名重複 (2) global AABB 碰撞濾掉跨名重疊
  const candidates = [];
  for (const name in segsByName){
    const grp = segsByName[name];
    grp.segs.sort((a,b) => b.len - a.len);
    const placed = [];
    for (const s of grp.segs){
      if (s.len < 25) break;
      let close = false;
      for (const p of placed){
        if (Math.hypot(p.mx - s.mx, p.my - s.my) < ROAD_LABEL_MIN_GAP){ close = true; break; }
      }
      if (close) continue;
      placed.push(s);
      candidates.push({name, ref:grp.ref, highway:grp.highway, level:grp.level, seg:s});
    }
  }
  // 計算每個 candidate 的 AABB (rotated rect → axis-aligned bbox in screen space)
  function labelAABB(c){
    const fs = c.level <= 2 ? 11 : (c.level === 3 ? 9.5 : 8);
    const nameW = c.name.length * fs * 1.05;
    const shieldW = c.ref ? fs * 2.2 : 0;
    const totalW = nameW + (c.ref ? 3 : 0) + shieldW;
    const halfW = totalW/2;
    const halfH = fs * 1.0;  // 路名 + 路標 高度上界
    const rad = c.seg.ang * Math.PI/180;
    const ca = Math.abs(Math.cos(rad)), sa = Math.abs(Math.sin(rad));
    const ahW = halfW*ca + halfH*sa;
    const ahH = halfW*sa + halfH*ca;
    return {
      xmin: c.seg.mx - ahW, xmax: c.seg.mx + ahW,
      ymin: c.seg.my - ahH, ymax: c.seg.my + ahH
    };
  }
  function aabbOverlap(a, b){
    return a.xmin < b.xmax && b.xmin < a.xmax && a.ymin < b.ymax && b.ymin < a.ymax;
  }
  // 排序: level asc (1=motorway 優先) → length desc
  candidates.sort((a,b) => (a.level - b.level) || (b.seg.len - a.seg.len));
  const placedAABBs = [];
  let dropped = 0;
  for (const c of candidates){
    const aabb = labelAABB(c);
    // 額外加 2px margin 防剛好擦邊
    const expanded = {xmin:aabb.xmin-2, xmax:aabb.xmax+2, ymin:aabb.ymin-2, ymax:aabb.ymax+2};
    let collide = false;
    for (const e of placedAABBs){
      if (aabbOverlap(expanded, e)){ collide = true; break; }
    }
    if (collide){ dropped++; continue; }
    placedAABBs.push(aabb);
    drawRoadLabel(roadsG, c.name, c.ref, c.highway, c.level, c.seg);
  }
  console.log('[label] placed=' + placedAABBs.length + ' dropped(collision)=' + dropped + ' total_cand=' + candidates.length);

  function drawRoadLabel(parent, name, ref, hw, level, seg){
    const fs = level <= 2 ? 11 : (level === 3 ? 9.5 : 8);
    const grp = document.createElementNS(NS,'g');
    grp.setAttribute('transform', `translate(${seg.mx} ${seg.my}) rotate(${seg.ang.toFixed(1)})`);
    grp.setAttribute('pointer-events', 'none');

    // 計算標籤總寬度
    const nameW = name.length * fs * 1.05;  // 中文寬約等字級
    const shieldW = ref ? fs * 2.2 : 0;
    const gap = ref ? 3 : 0;
    const totalW = nameW + gap + shieldW;
    const x0 = -totalW / 2;

    // 路名文字
    const t = document.createElementNS(NS,'text');
    t.setAttribute('x', x0);
    t.setAttribute('y', -3);
    t.setAttribute('text-anchor', 'start');
    t.setAttribute('font-size', fs);
    t.setAttribute('font-weight', '600');
    t.setAttribute('fill', '#5a3e1a');
    t.setAttribute('paint-order', 'stroke');
    t.setAttribute('stroke', 'rgba(251,246,238,.95)');
    t.setAttribute('stroke-width', '2.5');
    t.setAttribute('stroke-linejoin', 'round');
    t.textContent = name;
    grp.appendChild(t);

    // 路標圖示
    if (ref){
      drawRoadShield(grp, ref, hw, level, x0 + nameW + gap, -fs - 2, fs);
    }
    parent.appendChild(grp);
  }

  // 路標分類: 依 OSM highway tag + ref 精準判斷
  // 國道:    motorway/motorway_link + ref 純數字 1-10
  // 省道快速: trunk/trunk_link (台61~88 等)             → 紅盾
  // 省道一般: primary/primary_link (台1, 台31 等)       → 藍盾
  // 市/縣道:  secondary (113, 114, 112 等三位數)        → 白底黑框方
  // 鄉道:    tertiary 桃NN                            → 白底黑框橫長
  // ref 共線 "1;112" 取第一個
  function classifyRef(ref, highway, level){
    if (!ref) return null;
    highway = String(highway || '');
    const r = ref.split(';')[0].trim();

    // 桃NN: 鄉道
    if (/^桃/.test(r)) return {type:'township', text: r};

    // 台N 省道 (使用者顯式寫 "台1" 之類, OSM 桃園資料其實沒這種寫法)
    let m = r.match(/^台(\d+[甲乙丙丁己]?)$/);
    if (m){
      const isFwy = highway.startsWith('trunk');
      return {type: isFwy ? 'provincial_fwy' : 'provincial', text: m[1]};
    }

    // 純數字 (1, 31, 66, 113, 113丙, 110甲...)
    if (/^\d+[甲乙丙丁己]?$/.test(r)){
      // 國道: 以 OSM highway=motorway* 為準
      if (highway.startsWith('motorway')) return {type:'freeway', text: r};

      // 省道 vs 市縣道: 用編號位數
      // 省道編號 = 1-99 (如台1, 台31, 台66); 市縣道 = 100+ (如113, 114)
      const isShort = /^\d{1,2}[甲乙丙丁己]?$/.test(r);
      if (isShort){
        // 1-2 位 = 省道
        if (highway.startsWith('trunk')) return {type:'provincial_fwy', text: r};
        return {type:'provincial', text: r};
      }
      // 3+ 位 = 市/縣道
      return {type:'county', text: r};
    }
    // 其他: 當作市/縣道
    return {type:'county', text: r};
  
  }

  // SVG 路標 — 採 V14 官方 SVG 設計, 尺寸縮為 fs*scale
  // 國道梅花 — 簡化:綠色梅花輪廓 + 白邊 + 白色數字 (用 SVG path 模擬 5 瓣)
  // 省道一般 — 藍底白邊白字葫蘆 (倒梨型)
  // 省道快速 — 紅底白邊白字葫蘆
  // 市縣道  — 白底黑邊雙框黑字方
  // 鄉道    — 白底黑邊單框黑字橫長方 (前綴「桃」, 字體小)
  function drawRoadShield(parent, ref, highway, level, x, y, fs){
    const cls = classifyRef(ref, highway, level);
    if (!cls) return 0;
    const sz = fs * 1.4;  // shield size (v0.16: 1.85→1.4 縮小避免重疊)

    if (cls.type === 'freeway'){
      // 梅花 6 圓組合 (簡化但保持梅花特徵): 5 花瓣 + 中心
      const cx = x + sz/2, cy = y + sz/2, R = sz*0.42, pr = sz*0.21;
      // 5 花瓣 (頂、左上、右上、左下、右下)
      const angles = [-90, -90+72, -90+144, -90+216, -90+288];
      const pg = document.createElementNS(NS,'g');
      // v0.16: 白色梅花輪廓 — 5 個放大白瓣 + 1 個放大白中心 (跟綠梅花同形, radius 大 35%)
      const outerScale = 1.35;
      for (const a of angles){
        const rad = a * Math.PI/180;
        const px = cx + Math.cos(rad)*R*0.55;
        const py = cy + Math.sin(rad)*R*0.55;
        const wp = document.createElementNS(NS,'circle');
        wp.setAttribute('cx', px); wp.setAttribute('cy', py);
        wp.setAttribute('r', pr * outerScale);
        wp.setAttribute('fill', '#fff');
        pg.appendChild(wp);
      }
      const wc = document.createElementNS(NS,'circle');
      wc.setAttribute('cx', cx); wc.setAttribute('cy', cy);
      wc.setAttribute('r', pr * 1.3 * outerScale);
      wc.setAttribute('fill', '#fff');
      pg.appendChild(wc);
      // 5 綠瓣
      for (const a of angles){
        const rad = a * Math.PI/180;
        const px = cx + Math.cos(rad)*R*0.55;
        const py = cy + Math.sin(rad)*R*0.55;
        const c = document.createElementNS(NS,'circle');
        c.setAttribute('cx', px); c.setAttribute('cy', py);
        c.setAttribute('r', pr);
        c.setAttribute('fill', '#007a36');
        pg.appendChild(c);
      }
      // 中心圓 (綠 — 梅花本體中心)
      const center = document.createElementNS(NS,'circle');
      center.setAttribute('cx', cx); center.setAttribute('cy', cy);
      center.setAttribute('r', pr*1.3);
      center.setAttribute('fill', '#007a36');
      pg.appendChild(center);
      // v0.16: 白色內圓 — 數字底色, 還原官方梅花「白心綠瓣」結構
      const innerWhite = document.createElementNS(NS,'circle');
      innerWhite.setAttribute('cx', cx); innerWhite.setAttribute('cy', cy);
      innerWhite.setAttribute('r', pr*1.05);
      innerWhite.setAttribute('fill', '#fff');
      pg.appendChild(innerWhite);
      // v0.16: 黑色數字, 縮小到 0.55*fs 使比例正確 (字佔白心約 60%)
      const t = document.createElementNS(NS,'text');
      t.setAttribute('x', cx); t.setAttribute('y', cy + fs*0.19);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size', fs * 0.55);
      t.setAttribute('font-weight','800');
      t.setAttribute('fill','#000');
      t.textContent = cls.text;
      pg.appendChild(t);
      parent.appendChild(pg);
      return sz;

    } else if (cls.type === 'provincial' || cls.type === 'provincial_fwy'){
      // 葫蘆 — 採 V14 台一線.svg 官方輪廓 (內藍底/紅底 path)
      const fillColor = cls.type === 'provincial_fwy' ? '#c93232' : '#003876';
      const wrap = document.createElementNS(NS,'g');
      // 把 SVG 700x700 viewBox 縮放到 sz x sz, 平移到 (x,y)
      const k = sz / 700;
      wrap.setAttribute('transform', `translate(${x} ${y}) scale(${k})`);

      // 白邊框 (外輪廓, 略大)
      const outer = document.createElementNS(NS,'path');
      outer.setAttribute('d','M350,14.3c63.1-2.7,173.6,15.5,232.4,38.2l2.6,1.1c65.2,31.3,109.5,113,99.6,183.7l-0.1,1c-13.2,137.4-117.6,324-228.5,408.5c-24,23.3-72.3,41.1-106,39.1c-33.6,2-82-15.9-106-39.1C133.1,562.2,28.7,375.7,15.5,238.2l-0.1-1C5.5,166.5,49.8,84.8,115,53.6l2.6-1.1C176.4,29.8,286.9,11.6,350,14.3z');
      outer.setAttribute('fill','#ffffff');
      wrap.appendChild(outer);

      // 內葫蘆 (主體)
      const inner = document.createElementNS(NS,'path');
      inner.setAttribute('d','M420.7,607c-39.2,34.7-102.2,34.7-141.4,0c-102.4-77.8-199-249.6-211.4-376.1c-6.7-49.3,24.2-106.9,69.3-129.5c115.2-45.8,310.4-45.8,425.6,0c45.1,22.6,75.9,80.3,69.3,129.5C619.7,357.4,523.1,529.2,420.7,607z');
      inner.setAttribute('fill', fillColor);
      wrap.appendChild(inner);

      parent.appendChild(wrap);

      // 白色編號 (寫在葫蘆下半的圓肚部分, 中心約在 viewBox y=380 處)
      const t = document.createElementNS(NS,'text');
      t.setAttribute('x', x + sz/2);
      t.setAttribute('y', y + sz*0.66);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size', fs * 0.62);
      t.setAttribute('font-weight','800');
      t.setAttribute('fill','#fff');
      t.textContent = cls.text;
      parent.appendChild(t);
      return sz;

    } else if (cls.type === 'county'){
      // 市/縣道 方框 (白底黑雙框黑字) - V14 市道114.svg 設計
      // v0.16: 動態寬度 — 3 字以下用方框 sz×sz; 4+ 字 (113丙/110甲) 加寬避免壓框
      const cw = cls.text.length <= 3 ? sz : sz * (1 + (cls.text.length - 3) * 0.4);
      const r1 = document.createElementNS(NS,'rect');
      r1.setAttribute('x', x); r1.setAttribute('y', y);
      r1.setAttribute('width', cw); r1.setAttribute('height', sz);
      r1.setAttribute('fill','#fff');
      r1.setAttribute('stroke','#000');
      r1.setAttribute('stroke-width','1.5');
      parent.appendChild(r1);
      const r2 = document.createElementNS(NS,'rect');
      r2.setAttribute('x', x+1.8); r2.setAttribute('y', y+1.8);
      r2.setAttribute('width', cw-3.6); r2.setAttribute('height', sz-3.6);
      r2.setAttribute('fill','none');
      r2.setAttribute('stroke','#000');
      r2.setAttribute('stroke-width','0.7');
      parent.appendChild(r2);
      const t = document.createElementNS(NS,'text');
      t.setAttribute('x', x + cw/2);
      t.setAttribute('y', y + sz/2 + fs*0.17);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size', fs * 0.50);
      t.setAttribute('font-weight','700');
      t.setAttribute('fill','#000');
      t.textContent = cls.text;
      parent.appendChild(t);
      return cw;

    } else if (cls.type === 'township'){
      // 鄉道 橫長方 (白底黑邊單框, 字體較小因為「桃NN」)
      // v0.16: 動態寬度 — 4 字以下 1.5*sz; 5+ 字 (桃43-1) 加寬
      const tw = sz * (cls.text.length <= 4 ? 1.5 : 1.5 + (cls.text.length - 4) * 0.35);
      const th = sz * 0.78;
      const ty = y + (sz - th)/2;
      const r1 = document.createElementNS(NS,'rect');
      r1.setAttribute('x', x); r1.setAttribute('y', ty);
      r1.setAttribute('width', tw); r1.setAttribute('height', th);
      r1.setAttribute('fill','#fff');
      r1.setAttribute('stroke','#000');
      r1.setAttribute('stroke-width','1.2');
      parent.appendChild(r1);
      const t = document.createElementNS(NS,'text');
      t.setAttribute('x', x + tw/2);
      t.setAttribute('y', ty + th/2 + fs*0.17);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size', fs * 0.50);
      t.setAttribute('font-weight','700');
      t.setAttribute('fill','#000');
      t.textContent = cls.text;
      parent.appendChild(t);
      return tw;
    }
    return 0;
  }

  g.appendChild(roadsG);
  // 里名 label
  DATA.VILLAGES.forEach(v => {
    const [x,y] = project(v.centroid[0], v.centroid[1]);
    const t = document.createElementNS(NS,'text');
    t.setAttribute('class','village-label');
    t.setAttribute('x', x); t.setAttribute('y', y+4);
    t.textContent = v.name;
    g.appendChild(t);
  });
  svg.appendChild(g);
  applyT();
}

function partyL(p){const m={kmt:"國民黨",dpp:"民進黨",tpp:"民眾黨",indep:"無黨籍"};return p?`<span class="party ${p}">${m[p]||p}</span>`:'';}
function personH(p,kind){return `<div class="person ${kind}"><div class="avatar">${(p.name||'?').charAt(0)}</div><div class="body"><div class="name">${p.name}${partyL(p.party)}</div><div class="role">${p.role||''}</div>${p.phone?`<div class="extra">☎ ${p.phone}</div>`:''}${p.office?`<div class="extra">⌂ ${p.office}</div>`:''}${p.votes?`<div class="extra">${p.votes.toLocaleString()} 票</div>`:''}</div></div>`;}

function renderCouncilVotes(v, cd){
  // v0.16: 該里 23 候選人得票降冪, 當選 11 人標 ⭐, 0 票排最後
  const all = (cd.all_candidates_2022 || []).filter(c => c.elected);
  if (!all.length) return '<div class="empty">(待補)</div>';
  const cv = v.council_votes_2022 || {};
  const sorted = all.slice().sort((a,b)=>{
    const va = cv[a.name]||0, vb = cv[b.name]||0;
    if (va !== vb) return vb - va;
    // 同票數: 當選優先, 然後號次
    if (a.elected !== b.elected) return a.elected ? -1 : 1;
    return a.num - b.num;
  });
  const total = sorted.reduce((s,c)=>s + (cv[c.name]||0), 0);
  return sorted.map((c, idx) => {
    const votes = cv[c.name] || 0;
    const pct = total ? (votes/total*100) : 0;
    const star = '';  // v0.16: 全部都當選, 不需標記
    const cls = c.elected ? 'incumbent' : 'candidate';
    return `<div class="cand-row ${cls}${votes===0?' zero':''}">
      <div class="cand-num">${c.num}</div>
      <div class="cand-info">
        <div class="cand-name">${c.name}${partyL(c.party)}${star}</div>
        <div class="cand-bar"><div class="cand-bar-fill" style="width:${Math.min(100,pct*2.5).toFixed(1)}%;background:${barColor(c.party)}"></div></div>
      </div>
      <div class="cand-vote">${votes.toLocaleString()}<span class="cand-pct">${pct.toFixed(1)}%</span></div>
    </div>`;
  }).join('');
}
function barColor(p){return {kmt:'#1e3a8a',dpp:'#057a50',tpp:'#14b8c4',npp:'#fbbf24',np:'#7e22ce',tsp:'#dc2626',obasan:'#ec4899',green:'#16a34a',indep:'#6b7280'}[p]||'#6b7280';}

function selectV(name){
  const v = DATA.VILLAGES.find(x => x.name === name);
  if (!v) return;
  svg.querySelectorAll('.village').forEach(el => el.classList.toggle('selected', el.dataset.name === name));
  const cd = DATA.COUNCIL_DISTRICTS[v.council_district] || {};
  const inA = v.neighbors||[]; const out = (v.all_neighbors||[]).filter(n=>!inA.includes(n));
  document.getElementById('info-content').innerHTML = `
    <div class="v-header"><div class="v-eyebrow">桃園市 / ${v.district}</div><div class="v-name">${v.name} <span class="district">${v.council_district}</span></div></div>
    <div class="section"><h3>里長</h3>${personH({...v.village_chief, role:'里長'},'incumbent')}</div>
    <div class="section"><h3>2022 議員選舉得票 · ${v.council_district}</h3>${renderCouncilVotes(v, cd)}</div>
    <div class="section"><h3>2026 候選人 · ${v.council_district}</h3>${(cd.candidates_2026||[]).length===0?'<div class="empty">(2026 登記期約於投票前 50 天)</div>':(cd.candidates_2026||[]).map(p=>personH({...p,role:'登記候選'},'candidate')).join('')}</div>
    <div class="section"><h3>相鄰里 · 點擊跳轉</h3><div class="taglist">${inA.map(n=>`<span class="tag" data-jump="${n}">${n}</span>`).join('')}${out.map(n=>`<span class="tag outside">${n} 〉</span>`).join('')}</div></div>
    <div class="section"><h3>地區概略</h3><p class="intro-text">${v.intro||'(尚無資料)'}</p></div>`;
  document.getElementById('info').classList.add('open');
  document.querySelectorAll('[data-jump]').forEach(el => el.addEventListener('click', () => selectV(el.dataset.jump)));
}

document.getElementById('close-info').addEventListener('click', () => {
  document.getElementById('info').classList.remove('open');
  svg.querySelectorAll('.village').forEach(el => el.classList.remove('selected'));
});

// 道路切換
document.getElementById('toggle-roads').addEventListener('click', e => {
  const on = e.target.classList.toggle('active');
  document.getElementById('roads-layer').classList.toggle('show', on);
});

// 搜尋
const si = document.getElementById('search'), sr = document.getElementById('search-results');
si.addEventListener('input', () => {
  const q = si.value.trim();
  if (!q){sr.classList.remove('show'); return;}
  const hits = DATA.VILLAGES.filter(v => v.name.includes(q) || (v.village_chief && v.village_chief.name && v.village_chief.name.includes(q))).slice(0,8);
  sr.innerHTML = hits.length ? hits.map(v=>`<div class="item" data-name="${v.name}"><div>${v.name}</div><div class="meta">${v.district} · 里長 ${v.village_chief.name}</div></div>`).join('') : '<div class="item" style="color:#5a4f44">查無結果</div>';
  sr.classList.add('show');
});
sr.addEventListener('click', e => {
  const i = e.target.closest('.item');
  if (i && i.dataset.name){selectV(i.dataset.name); si.value=''; sr.classList.remove('show');}
});
document.addEventListener('click', e => {if (!e.target.closest('.search-wrap')) sr.classList.remove('show');});

// 縮放/平移
function zoom(f, cx, cy){
  const ns = Math.max(0.5, Math.min(20, view.scale*f));
  if (cx===undefined){cx=svg.clientWidth/2; cy=svg.clientHeight/2;}
  const pt = svg.createSVGPoint(); pt.x=cx; pt.y=cy;
  const sp = pt.matrixTransform(svg.getScreenCTM().inverse());
  const wx = (sp.x-view.tx)/view.scale, wy = (sp.y-view.ty)/view.scale;
  view.scale = ns; view.tx = sp.x-wx*ns; view.ty = sp.y-wy*ns;
  applyT();
}
document.getElementById('zoom-in').addEventListener('click', () => zoom(1.4));
document.getElementById('zoom-out').addEventListener('click', () => zoom(1/1.4));
document.getElementById('reset-view').addEventListener('click', () => {view={tx:0,ty:0,scale:1}; applyT();});

let drag=null;
svg.addEventListener('mousedown', e=>{if(e.target.closest('.village'))return; drag={x:e.clientX,y:e.clientY,tx0:view.tx,ty0:view.ty};});
window.addEventListener('mousemove', e=>{if(!drag)return; const c=svg.getScreenCTM().inverse(); view.tx=drag.tx0+(e.clientX-drag.x)*c.a; view.ty=drag.ty0+(e.clientY-drag.y)*c.d; applyT();});
window.addEventListener('mouseup', ()=>drag=null);
svg.addEventListener('wheel', e=>{e.preventDefault(); zoom(e.deltaY<0?1.15:1/1.15, e.clientX, e.clientY);}, {passive:false});

let touch=null;
svg.addEventListener('touchstart', e=>{
  if(e.touches.length===1){const t=e.touches[0]; touch={mode:'pan',x:t.clientX,y:t.clientY,tx0:view.tx,ty0:view.ty};}
  else if(e.touches.length===2){const [a,b]=e.touches; touch={mode:'pinch',d0:Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),scale0:view.scale,cx:(a.clientX+b.clientX)/2,cy:(a.clientY+b.clientY)/2,tx0:view.tx,ty0:view.ty};}
}, {passive:true});
svg.addEventListener('touchmove', e=>{
  if(!touch)return; e.preventDefault();
  if(touch.mode==='pan' && e.touches.length===1){const t=e.touches[0]; const c=svg.getScreenCTM().inverse(); view.tx=touch.tx0+(t.clientX-touch.x)*c.a; view.ty=touch.ty0+(t.clientY-touch.y)*c.d; applyT();}
  else if(touch.mode==='pinch' && e.touches.length===2){const [a,b]=e.touches; const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); const ns=Math.max(0.5,Math.min(20,touch.scale0*d/touch.d0)); const pt=svg.createSVGPoint(); pt.x=touch.cx; pt.y=touch.cy; const sp=pt.matrixTransform(svg.getScreenCTM().inverse()); const wx=(sp.x-touch.tx0)/touch.scale0, wy=(sp.y-touch.ty0)/touch.scale0; view.scale=ns; view.tx=sp.x-wx*ns; view.ty=sp.y-wy*ns; applyT();}
}, {passive:false});
svg.addEventListener('touchend', ()=>touch=null);

// 啟動
window.addEventListener('error', e=>{const d=document.createElement('div'); d.style.cssText='position:fixed;top:50%;left:10%;right:10%;transform:translateY(-50%);background:#fff;border:2px solid #a34238;padding:16px;border-radius:10px;font-size:13px;z-index:999'; d.innerHTML='<b style="color:#a34238">錯誤</b><br><br><code style="font-size:11px;word-break:break-all">'+e.message+' @ '+(e.filename||'')+':'+(e.lineno||'')+'</code>'; document.body.appendChild(d);});
buildMap();
// URL 參數 ?roads=on -> 自動開啟道路圖層 (給 headless 截圖用,也可以給 demo)
if (location.search.includes('roads=on')){
  document.getElementById('toggle-roads').click();
}
</script>
