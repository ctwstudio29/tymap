<title>桃園里長地圖 v0.3 過嶺地區</title>
<style>
:root{
  --bg: #fbf6ee;
  --bg-soft: #f3ebdc;
  --ink: #2a2520;
  --ink-soft: #5a4f44;
  --line: #d9cdb5;
  --accent: #a34238;
  --accent-deep: #7a2e26;
  --leaf: #3d6a4a;
  --leaf-soft: #7a9a83;
  --gold: #c89243;
  --paper: #ffffff;
  --shadow: 0 6px 24px -8px rgba(60,40,20,.25), 0 2px 6px -2px rgba(60,40,20,.12);
  --v-1:#f4d4c8; --v-2:#e6d5a8; --v-3:#c8d8b8;
  --v-4:#b8d0d8; --v-5:#d4c0d8; --v-6:#f0c8b0; --v-7:#d8d0a0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:"PingFang TC","Microsoft JhengHei","Heiti TC","Noto Sans CJK TC","Noto Sans TC",sans-serif;
  background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:calc(56px + env(safe-area-inset-top));
  padding:env(safe-area-inset-top) 12px 0;
  background:linear-gradient(180deg,#a34238,#8a3128);
  color:#fff8ee;display:flex;align-items:center;gap:10px;z-index:100;
  box-shadow:0 2px 12px -4px rgba(0,0,0,.25);
}
.topbar h1{font-size:16px;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.topbar .sub{font-size:10px;opacity:.7;letter-spacing:.15em;margin-left:2px}
.search-wrap{flex:1;position:relative;max-width:320px}
.search-wrap input{
  width:100%;background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.28);color:#fff8ee;
  padding:8px 12px 8px 32px;border-radius:999px;font-size:14px;
  outline:none;font-family:inherit;
}
.search-wrap input::placeholder{color:rgba(255,248,238,.6)}
.search-wrap input:focus{background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.6)}
.search-wrap::before{
  content:"⚲";position:absolute;left:11px;top:50%;
  transform:translateY(-50%) rotate(-45deg);font-size:14px;opacity:.65;
}
.topbar button{
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);
  color:#fff8ee;padding:7px 11px;border-radius:8px;font-size:12px;
  font-family:inherit;cursor:pointer;white-space:nowrap;
}
.topbar button.active{background:var(--gold);color:#3a2a14;border-color:var(--gold);font-weight:700}
.search-results{
  position:absolute;top:44px;left:0;right:0;background:var(--paper);
  border-radius:10px;box-shadow:var(--shadow);max-height:260px;overflow:auto;
  display:none;border:1px solid var(--line);
}
.search-results.show{display:block}
.search-results .item{
  padding:10px 14px;color:var(--ink);font-size:14px;
  border-bottom:1px solid var(--bg-soft);cursor:pointer;
}
.search-results .item:hover{background:var(--bg-soft)}
.search-results .item .meta{font-size:11px;color:var(--ink-soft);margin-top:2px}

.map-wrap{
  position:fixed;top:calc(56px + env(safe-area-inset-top));
  left:0;right:0;bottom:0;
  background:
    radial-gradient(ellipse at 30% 20%, #f8eedf 0%, transparent 60%),
    repeating-linear-gradient(135deg, transparent 0, transparent 18px, rgba(180,140,90,.04) 18px, rgba(180,140,90,.04) 19px),
    var(--bg);
  overflow:hidden;touch-action:none;
}
#mapsvg{width:100%;height:100%;display:block}
#mapsvg .village{cursor:pointer;transition:opacity .15s ease, filter .15s ease}
#mapsvg .village:hover{opacity:.85}
#mapsvg .village.selected{
  filter:brightness(.92) saturate(1.3) drop-shadow(0 0 6px rgba(163,66,56,.5));
  stroke:var(--accent);stroke-width:1.4;
}
#mapsvg .village-label{
  font-size:13px;font-weight:600;fill:var(--ink);
  pointer-events:none;text-anchor:middle;
  paint-order:stroke;stroke:rgba(251,246,238,.9);
  stroke-width:3;stroke-linejoin:round;
}
/* 道路圖層 */
#mapsvg .roads{
  opacity:0; pointer-events:none;
  transition:opacity .25s ease;
}
#mapsvg .roads.show{ opacity:1 }
#mapsvg .road-line{
  fill:none; stroke-linecap:round; stroke-linejoin:round;
  pointer-events:none;
}
#mapsvg .road-line.lv1{ stroke:#a83d1f; stroke-width:3.2 }   /* 國道 */
#mapsvg .road-line.lv2{ stroke:#c66a2e; stroke-width:2.6 }   /* 快速道路 */
#mapsvg .road-line.lv3{ stroke:#b08a4a; stroke-width:2.0 }   /* 省道/主要 */
#mapsvg .road-line.lv4{ stroke:#a89570; stroke-width:1.4 }   /* 縣道/次要 */
#mapsvg .road-line.lv5{ stroke:#b8a888; stroke-width:1.0 }   /* 鄉道 */
#mapsvg .road-casing{
  fill:none; stroke:#fbf6ee; stroke-linecap:round; stroke-linejoin:round;
  pointer-events:none;
}
#mapsvg .road-casing.lv1{ stroke-width:5.2 }
#mapsvg .road-casing.lv2{ stroke-width:4.4 }
#mapsvg .road-casing.lv3{ stroke-width:3.6 }
#mapsvg .road-casing.lv4{ stroke-width:2.6 }
#mapsvg .road-casing.lv5{ stroke-width:1.8 }
#mapsvg .road-label{
  font-size:9px; font-weight:600;
  fill:#5a3e1a; pointer-events:none;
  paint-order:stroke;
  stroke:rgba(251,246,238,.95);
  stroke-width:2.5; stroke-linejoin:round;
}
#mapsvg .me-dot{
  fill:#1d6fcb;stroke:#fff;stroke-width:2;
  filter:drop-shadow(0 0 6px rgba(29,111,203,.6));
  animation:pulse 1.5s ease-out infinite;
}
@keyframes pulse{
  0%{r:6}50%{r:9}100%{r:6}
}
#mapsvg .me-ring{
  fill:rgba(29,111,203,.15);stroke:none;
  animation:ring 2s ease-out infinite;
}
@keyframes ring{
  0%{r:6;opacity:.6}100%{r:30;opacity:0}
}

.hud{
  position:absolute;right:12px;
  bottom:calc(20px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:8px;z-index:50;
}
.hud button{
  width:44px;height:44px;border-radius:12px;background:var(--paper);
  border:1px solid var(--line);color:var(--ink);font-size:20px;
  font-weight:600;cursor:pointer;box-shadow:var(--shadow);font-family:inherit;
}
.hud button:active{transform:scale(.95)}
.hud .me{font-size:18px;color:#1d6fcb}
.hud .me.active{background:#1d6fcb;color:#fff;border-color:#1d6fcb}

.title-stamp{
  position:absolute;top:12px;left:12px;background:var(--paper);
  padding:8px 14px;border-radius:10px;box-shadow:var(--shadow);
  border-left:4px solid var(--accent);z-index:40;font-size:13px;
}
.title-stamp .name{font-weight:700;font-size:15px;color:var(--accent)}
.title-stamp .count{font-size:11px;color:var(--ink-soft);letter-spacing:.05em;margin-top:2px}

.legend{
  position:absolute;left:12px;
  bottom:calc(20px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  padding:10px 12px;border-radius:10px;font-size:11px;
  border:1px solid var(--line);box-shadow:var(--shadow);z-index:40;
}
.legend .row{display:flex;align-items:center;gap:8px;margin:3px 0}
.legend .swatch{width:16px;height:10px;border:1px solid rgba(0,0,0,.15)}
.legend .swatch.dot{
  width:10px;height:10px;border-radius:50%;
  background:#1d6fcb;border:2px solid #fff;
  box-shadow:0 0 4px rgba(29,111,203,.5);
}

.scale-bar{
  position:absolute;right:12px;top:12px;z-index:40;
  background:rgba(255,255,255,.92);
  padding:6px 10px;border-radius:8px;
  font-size:11px;font-family:"SF Mono",monospace;
  border:1px solid var(--line);
  display:flex;align-items:center;gap:8px;
}
.scale-bar .bar{
  width:60px;height:6px;
  background:linear-gradient(90deg, #2a2520 0%, #2a2520 50%, #fff 50%, #fff 100%);
  border:1px solid #2a2520;
}

.info-panel{
  position:fixed;background:var(--paper);z-index:80;
  display:flex;flex-direction:column;
  transition:transform .3s cubic-bezier(.32,.72,.36,1);
  box-shadow:0 -4px 24px -6px rgba(0,0,0,.18);overflow:hidden;
}
@media (max-width:768px){
  .info-panel{
    left:0;right:0;bottom:0;max-height:70vh;
    border-radius:16px 16px 0 0;
    transform:translateY(105%);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .info-panel.open{transform:translateY(0)}
  .info-panel .grip{height:4px;width:40px;background:var(--line);border-radius:2px;margin:8px auto 4px}
}
@media (min-width:769px){
  .info-panel{
    top:calc(56px + env(safe-area-inset-top));bottom:0;right:0;width:380px;
    transform:translateX(105%);border-left:1px solid var(--line);
    box-shadow:-6px 0 24px -8px rgba(0,0,0,.12);
  }
  .info-panel.open{transform:translateX(0)}
  .info-panel .grip{display:none}
}
.info-panel .scroll{flex:1;overflow-y:auto;padding:4px 18px 24px;-webkit-overflow-scrolling:touch}
.info-panel .close-x{
  position:absolute;top:10px;right:14px;background:var(--bg-soft);
  border:none;width:30px;height:30px;border-radius:50%;font-size:18px;
  cursor:pointer;color:var(--ink-soft);z-index:2;
}
.v-header{padding:8px 0 14px;border-bottom:1px solid var(--bg-soft);margin-bottom:14px}
.v-eyebrow{font-size:11px;letter-spacing:.25em;color:var(--ink-soft);margin-bottom:4px}
.v-name{font-size:28px;font-weight:800;letter-spacing:.02em;color:var(--ink);display:flex;align-items:baseline;gap:8px}
.v-name .district{font-size:14px;font-weight:500;color:var(--accent);letter-spacing:.08em}
.section{margin:16px 0}
.section h3{
  font-size:11px;letter-spacing:.25em;color:var(--ink-soft);
  font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.section h3::before{content:"";width:18px;height:1px;background:var(--accent)}
.section .empty{font-size:12px;color:var(--ink-soft);font-style:italic}

.person{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  background:var(--bg-soft);border-radius:10px;margin-bottom:6px;
  border-left:3px solid var(--ink-soft);
}
.person .avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#c89243,#a36e30);
  color:#fff8ee;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:16px;flex-shrink:0;
}
.person .body{flex:1;min-width:0}
.person .name{font-weight:700;font-size:15px}
.person .role{font-size:11px;color:var(--ink-soft);letter-spacing:.1em;margin-top:1px}
.person .extra{font-size:12px;color:var(--ink-soft);margin-top:4px}
.person.incumbent{border-left-color:var(--accent);background:#fbeae6}
.person.candidate{border-left-color:var(--gold);background:#fdf3df}
.party{
  display:inline-block;padding:1px 7px;font-size:10px;border-radius:3px;
  font-weight:700;letter-spacing:.1em;margin-left:6px;
}
.party.kmt{background:#1e3a8a;color:#fff}
.party.dpp{background:#057a50;color:#fff}
.party.tpp{background:#14b8c4;color:#fff}
.party.npp{background:#f59e0b;color:#2a2520}
.party.indep{background:#6b7280;color:#fff}
.intro-text{
  font-size:14px;line-height:1.7;color:var(--ink);
  background:var(--bg);padding:12px 14px;border-radius:8px;
  border-left:3px solid var(--leaf-soft);
}
.taglist{display:flex;flex-wrap:wrap;gap:6px}
.taglist .tag{
  font-size:12px;padding:4px 10px;background:var(--bg);
  border:1px solid var(--line);border-radius:999px;cursor:pointer;color:var(--ink);
}
.taglist .tag:hover{background:var(--bg-soft)}
.taglist .tag.road{background:#fef2e2;border-color:#e8c595;color:#8a5a1a;cursor:default}
.taglist .tag.outside{background:#f0ebe2;color:var(--ink-soft);font-style:italic;cursor:default}

.hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(42,37,32,.88);color:#fff8ee;
  padding:14px 22px;border-radius:12px;font-size:14px;
  pointer-events:none;letter-spacing:.04em;z-index:60;
  opacity:0;transition:opacity .3s ease;
}
.hint.show{opacity:1}
.mark{
  position:fixed;bottom:calc(4px + env(safe-area-inset-bottom));
  right:8px;font-size:10px;color:var(--ink-soft);opacity:.55;
  z-index:30;pointer-events:none;
}
</style>
</head>

/* === Mercator-ish projection (small area: equirectangular w/ cosLat) === */
const bbox = DATA.meta.bbox;  // [w, s, e, n]
const PAD_DEG = 0.003;  // 視窗外緣留白 (~330 m)
const W = bbox[0] - PAD_DEG, S = bbox[1] - PAD_DEG;
const E = bbox[2] + PAD_DEG, N = bbox[3] + PAD_DEG;
const midLat = (S + N) / 2;
const cosLat = Math.cos(midLat * Math.PI / 180);

const VIEW_W = 1000;
const lngSpan = (E - W) * cosLat;
const latSpan = N - S;
const VIEW_H = VIEW_W * latSpan / lngSpan;

function project(lng, lat){
  return [
    ((lng - W) * cosLat / lngSpan) * VIEW_W,
    ((N - lat) / latSpan) * VIEW_H,
  ];
}

/* === Render === */
const svg = document.getElementById('mapsvg');
const NS = "http://www.w3.org/2000/svg";

let view = { tx:0, ty:0, scale:1 };
function applyTransform(){
  const g = svg.querySelector('g.world');
  if (g) g.setAttribute('transform', `translate(${view.tx} ${view.ty}) scale(${view.scale})`);
  updateScaleBar();
}

function pointsFromRing(ring){
  return ring.map(([lng,lat]) => project(lng,lat).join(',')).join(' ');
}

function buildMap(){
  svg.setAttribute('viewBox', `0 0 ${VIEW_W} ${VIEW_H}`);

  const g = document.createElementNS(NS,'g');
  g.setAttribute('class','world');

  // village polygons
  const colorOf = {};
  DATA.VILLAGES.forEach(v => colorOf[v.name] = v.color);

  DATA.GEOJSON.features.forEach(f => {
    const name = f.properties.VILLNAME;
    const geom = f.geometry;
    const wrap = document.createElementNS(NS,'g');
    wrap.setAttribute('class','village');
    wrap.dataset.name = name;
    const color = colorOf[name] || 'var(--v-1)';

    const rings = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
    rings.forEach(poly => {
      const path = document.createElementNS(NS,'polygon');
      path.setAttribute('points', pointsFromRing(poly[0]));
      path.setAttribute('fill', color);
      path.setAttribute('stroke', '#7a5a3a');
      path.setAttribute('stroke-width', '0.6');
      path.setAttribute('stroke-linejoin', 'round');
      wrap.appendChild(path);
    });

    wrap.addEventListener('click', e => { e.stopPropagation(); selectVillage(name); });
    g.appendChild(wrap);
  });

  // 道路圖層 (在里之上)
  const roadsG = document.createElementNS(NS,'g');
  roadsG.setAttribute('class','roads');
  roadsG.id = 'roads-layer';
  // 先 casing (白邊),再主線
  for (const r of (DATA.ROADS || [])){
    const lv = r.level || 5;
    const pts = r.coords.map(([lng,lat]) => project(lng,lat).join(',')).join(' ');
    const casing = document.createElementNS(NS,'polyline');
    casing.setAttribute('class', `road-casing lv${lv}`);
    casing.setAttribute('points', pts);
    roadsG.appendChild(casing);
  }
  for (const r of (DATA.ROADS || [])){
    const lv = r.level || 5;
    const pts = r.coords.map(([lng,lat]) => project(lng,lat).join(',')).join(' ');
    const line = document.createElementNS(NS,'polyline');
    line.setAttribute('class', `road-line lv${lv}`);
    line.setAttribute('points', pts);
    roadsG.appendChild(line);
  }
  // 道路標籤 (放在最長線段中點,旋轉貼合方向)
  for (const r of (DATA.ROADS || [])){
    if (!r.label || r.coords.length < 2) continue;
    // 找最長的子線段
    let maxL = 0, mid = null, ang = 0;
    for (let i=0; i<r.coords.length-1; i++){
      const [x1,y1] = project(...r.coords[i]);
      const [x2,y2] = project(...r.coords[i+1]);
      const dx = x2-x1, dy = y2-y1;
      const L = Math.hypot(dx, dy);
      if (L > maxL){
        maxL = L;
        mid = [(x1+x2)/2, (y1+y2)/2];
        ang = Math.atan2(dy, dx) * 180/Math.PI;
        // keep label upright (avoid upside-down)
        if (ang > 90) ang -= 180;
        if (ang < -90) ang += 180;
      }
    }
    if (!mid || maxL < 30) continue;  // 太短不放標
    const t = document.createElementNS(NS,'text');
    t.setAttribute('class','road-label');
    t.setAttribute('x', mid[0]);
    t.setAttribute('y', mid[1] - 3);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('transform', `rotate(${ang.toFixed(1)} ${mid[0]} ${mid[1]})`);
    t.textContent = r.label;
    roadsG.appendChild(t);
  }
  g.appendChild(roadsG);

  // labels (里名,在最頂層)
  DATA.VILLAGES.forEach(v => {
    const [x,y] = project(v.centroid[0], v.centroid[1]);
    const t = document.createElementNS(NS,'text');
    t.setAttribute('class','village-label');
    t.setAttribute('x', x);
    t.setAttribute('y', y + 4);
    t.textContent = v.name;
    g.appendChild(t);
  });

  // me marker placeholder (hidden until geolocation)
  const meRing = document.createElementNS(NS,'circle');
  meRing.setAttribute('class','me-ring');
  meRing.id = 'me-ring';
  meRing.setAttribute('r','6');
  meRing.style.display = 'none';
  g.appendChild(meRing);

  const meDot = document.createElementNS(NS,'circle');
  meDot.setAttribute('class','me-dot');
  meDot.id = 'me-dot';
  meDot.setAttribute('r','6');
  meDot.style.display = 'none';
  g.appendChild(meDot);

  svg.appendChild(g);
  applyTransform();
}

/* === Scale bar (動態算當前縮放下 60 svg-units 對應幾公尺) === */
function updateScaleBar(){
  // 60 svg-units in pixels at current scale
  const svgUnitsPerMeterInLngAtMidLat =
    (VIEW_W) / (lngSpan * 111000);  // 1 metre = ? svg-units (lng axis)
  // After scale, 60 svg-units = 60 / scale svg-units in original
  // Actually we want: how many real metres does 60 displayed svg-units span?
  const realMetersPer60Units = 60 / view.scale / svgUnitsPerMeterInLngAtMidLat;
  let label;
  if (realMetersPer60Units >= 1000) label = (realMetersPer60Units/1000).toFixed(1) + ' km';
  else label = Math.round(realMetersPer60Units) + ' m';
  document.getElementById('scale-label').textContent = label;
}

/* === 選里 === */
let selectedName = null;
function selectVillage(name){
  const v = DATA.VILLAGES.find(x => x.name === name);
  if (!v){
    // possibly outside-area village, just bring user there if known
    return;
  }
  selectedName = name;
  svg.querySelectorAll('.village').forEach(el => {
    el.classList.toggle('selected', el.dataset.name === name);
  });
  renderInfo(v);
  document.getElementById('info').classList.add('open');
  hideHint();
}

function partyLabel(p){
  const m = {kmt:"國民黨",dpp:"民進黨",tpp:"民眾黨",npp:"時代力量",indep:"無黨籍"};
  return p ? `<span class="party ${p}">${m[p]||p}</span>` : '';
}

function personHTML(p, kind){
  return `<div class="person ${kind}">
    <div class="avatar">${(p.name||'?').charAt(0)}</div>
    <div class="body">
      <div class="name">${p.name}${partyLabel(p.party)}</div>
      <div class="role">${p.role||''}</div>
      ${p.phone?`<div class="extra">☎ ${p.phone}</div>`:''}
      ${p.office?`<div class="extra">⌂ ${p.office}</div>`:''}
      ${p.term?`<div class="extra">${p.term}</div>`:''}
    </div>
  </div>`;
}

function renderInfo(v){
  const cd = DATA.COUNCIL_DISTRICTS[v.council_district] || {};
  const inAreaNbrs = v.neighbors || [];
  const outsideNbrs = (v.all_neighbors || []).filter(n => !inAreaNbrs.includes(n));

  document.getElementById('info-content').innerHTML = `
    <div class="v-header">
      <div class="v-eyebrow">桃園市 / ${v.district}</div>
      <div class="v-name">${v.name} <span class="district">${v.council_district}</span></div>
    </div>

    <div class="section">
      <h3>里長</h3>
      ${personHTML({...v.village_chief, role:'里長'}, 'incumbent')}
    </div>

    <div class="section">
      <h3>現任議員 · ${v.council_district}</h3>
      ${(cd.incumbents||[]).length === 0
        ? '<div class="empty">(待補,需議員選區對應表)</div>'
        : (cd.incumbents||[]).map(p => personHTML({...p, role:'現任'}, 'incumbent')).join('')}
    </div>

    <div class="section">
      <h3>2026 候選人 · ${v.council_district}</h3>
      ${(cd.candidates_2026||[]).length === 0
        ? '<div class="empty">(2026 登記期約於投票前 50 天)</div>'
        : (cd.candidates_2026||[]).map(p => personHTML({...p, role:'登記候選'}, 'candidate')).join('')}
    </div>

    <div class="section">
      <h3>主要道路</h3>
      ${(v.main_roads||[]).length === 0
        ? '<div class="empty">(待補)</div>'
        : `<div class="taglist">${v.main_roads.map(r=>`<span class="tag road">${r}</span>`).join('')}</div>`}
    </div>

    <div class="section">
      <h3>相鄰里 · 點擊跳轉</h3>
      <div class="taglist">
        ${inAreaNbrs.map(n=>`<span class="tag" data-jump="${n}">${n}</span>`).join('')}
        ${outsideNbrs.map(n=>`<span class="tag outside" title="不在當前範圍">${n} 〉</span>`).join('')}
      </div>
    </div>

    <div class="section">
      <h3>地區概略</h3>
      <p class="intro-text">${v.intro || '(尚無資料)'}</p>
    </div>
  `;

  document.getElementById('info-content').querySelectorAll('[data-jump]').forEach(el => {
    el.addEventListener('click', () => selectVillage(el.dataset.jump));
  });
}

document.getElementById('close-info').addEventListener('click', () => {
  document.getElementById('info').classList.remove('open');
  selectedName = null;
  svg.querySelectorAll('.village').forEach(el => el.classList.remove('selected'));
});

/* === 搜尋 === */
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q){ searchResults.classList.remove('show'); return; }
  const hits = DATA.VILLAGES.filter(v =>
    v.name.includes(q) || v.district.includes(q) ||
    (v.village_chief && v.village_chief.name && v.village_chief.name.includes(q))
  ).slice(0, 8);
  searchResults.innerHTML = hits.length
    ? hits.map(v => `<div class="item" data-name="${v.name}">
        <div>${v.name}</div>
        <div class="meta">${v.district} · ${v.council_district}</div>
      </div>`).join('')
    : '<div class="item" style="color:var(--ink-soft)">查無相符結果</div>';
  searchResults.classList.add('show');
});
searchResults.addEventListener('click', e => {
  const item = e.target.closest('.item');
  if (item && item.dataset.name){
    selectVillage(item.dataset.name);
    searchInput.value = '';
    searchResults.classList.remove('show');
  }
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
});

/* === 縮放/平移 (滑鼠 + 觸控) === */
function clampScale(s){ return Math.max(0.5, Math.min(20, s)); }

function zoomBy(factor, cx, cy){
  const newScale = clampScale(view.scale * factor);
  if (cx === undefined){ cx = svg.clientWidth/2; cy = svg.clientHeight/2; }
  const pt = svg.createSVGPoint();
  pt.x = cx; pt.y = cy;
  const ctm = svg.getScreenCTM().inverse();
  const svgP = pt.matrixTransform(ctm);
  const wx = (svgP.x - view.tx) / view.scale;
  const wy = (svgP.y - view.ty) / view.scale;
  view.scale = newScale;
  view.tx = svgP.x - wx * newScale;
  view.ty = svgP.y - wy * newScale;
  applyTransform();
}

document.getElementById('zoom-in').addEventListener('click', () => zoomBy(1.4));
document.getElementById('zoom-out').addEventListener('click', () => zoomBy(1/1.4));
document.getElementById('reset-view').addEventListener('click', () => {
  view = {tx:0,ty:0,scale:1}; applyTransform();
});

let drag = null;
svg.addEventListener('mousedown', e => {
  if (e.target.closest('.village')) return;
  drag = {x:e.clientX, y:e.clientY, tx0:view.tx, ty0:view.ty};
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const ctm = svg.getScreenCTM().inverse();
  view.tx = drag.tx0 + (e.clientX - drag.x) * ctm.a;
  view.ty = drag.ty0 + (e.clientY - drag.y) * ctm.d;
  applyTransform();
});
window.addEventListener('mouseup', () => drag = null);

svg.addEventListener('wheel', e => {
  e.preventDefault();
  zoomBy(e.deltaY < 0 ? 1.15 : 1/1.15, e.clientX, e.clientY);
}, {passive:false});

let touch = null;
svg.addEventListener('touchstart', e => {
  if (e.touches.length === 1){
    const t = e.touches[0];
    touch = {mode:'pan', x:t.clientX, y:t.clientY, tx0:view.tx, ty0:view.ty,
             startedOnVillage: !!e.target.closest('.village'),
             startTime: Date.now()};
  } else if (e.touches.length === 2){
    const [a,b] = e.touches;
    touch = {mode:'pinch',
             d0: Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY),
             scale0: view.scale,
             cx:(a.clientX+b.clientX)/2, cy:(a.clientY+b.clientY)/2,
             tx0:view.tx, ty0:view.ty};
  }
}, {passive:true});

svg.addEventListener('touchmove', e => {
  if (!touch) return;
  e.preventDefault();
  if (touch.mode==='pan' && e.touches.length===1){
    const t = e.touches[0];
    const ctm = svg.getScreenCTM().inverse();
    view.tx = touch.tx0 + (t.clientX - touch.x) * ctm.a;
    view.ty = touch.ty0 + (t.clientY - touch.y) * ctm.d;
    applyTransform();
    touch.moved = true;
  } else if (touch.mode==='pinch' && e.touches.length===2){
    const [a,b] = e.touches;
    const d = Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY);
    const newScale = clampScale(touch.scale0 * d / touch.d0);
    const pt = svg.createSVGPoint();
    pt.x = touch.cx; pt.y = touch.cy;
    const ctm = svg.getScreenCTM().inverse();
    const svgP = pt.matrixTransform(ctm);
    const wx = (svgP.x - touch.tx0) / touch.scale0;
    const wy = (svgP.y - touch.ty0) / touch.scale0;
    view.scale = newScale;
    view.tx = svgP.x - wx * newScale;
    view.ty = svgP.y - wy * newScale;
    applyTransform();
  }
}, {passive:false});

svg.addEventListener('touchend', () => touch = null);
svg.addEventListener('touchcancel', () => touch = null);

/* === 提示 === */
let hintTimer = null;
function showHint(text, ms=2200){
  const h = document.getElementById('hint');
  if (!text){ h.classList.remove('show'); return; }
  h.textContent = text;
  h.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => h.classList.remove('show'), ms);
}
function hideHint(){ document.getElementById('hint').classList.remove('show'); }

/* === 定位 === */
const meBtn = document.getElementById('locate-me');
let watchId = null;
meBtn.addEventListener('click', () => {
  if (watchId !== null){
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
    document.getElementById('me-dot').style.display = 'none';
    document.getElementById('me-ring').style.display = 'none';
    meBtn.classList.remove('active');
    return;
  }
  if (!navigator.geolocation){ showHint('裝置不支援定位'); return; }
  meBtn.classList.add('active');
  showHint('定位中...');
  watchId = navigator.geolocation.watchPosition(
    pos => {
      const {longitude:lng, latitude:lat} = pos.coords;
      // 是否在範圍內?
      if (lng < W || lng > E || lat < S || lat > N){
        showHint(`目前位置不在過嶺地區範圍內 (${lat.toFixed(4)}, ${lng.toFixed(4)})`, 4000);
        meBtn.classList.remove('active');
        return;
      }
      const [x,y] = project(lng,lat);
      const dot = document.getElementById('me-dot');
      const ring = document.getElementById('me-ring');
      dot.setAttribute('cx', x); dot.setAttribute('cy', y); dot.style.display = '';
      ring.setAttribute('cx', x); ring.setAttribute('cy', y); ring.style.display = '';
      // 找到所在里
      const here = pointInVillage(lng, lat);
      if (here) showHint(`你在 ${here} 附近`, 3500);
    },
    err => {
      showHint(`定位失敗: ${err.message}`, 3500);
      meBtn.classList.remove('active');
    },
    {enableHighAccuracy:true, maximumAge:5000, timeout:10000}
  );
});

function pointInVillage(lng, lat){
  for (const f of DATA.GEOJSON.features){
    if (pointInPolygon([lng,lat], f.geometry)){
      return f.properties.VILLNAME;
    }
  }
  return null;
}
function pointInPolygon(p, geom){
  const rings = geom.type==='Polygon' ? [geom.coordinates] : geom.coordinates;
  for (const poly of rings){
    if (rayCast(p, poly[0])) return true;
  }
  return false;
}
function rayCast(point, ring){
  let inside = false;
  for (let i=0, j=ring.length-1; i<ring.length; j=i++){
    const [xi,yi] = ring[i], [xj,yj] = ring[j];
    if (((yi>point[1]) !== (yj>point[1])) &&
        (point[0] < (xj-xi)*(point[1]-yi)/(yj-yi)+xi)){
      inside = !inside;
    }
  }
  return inside;
}

/* === 鍵盤 === */
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('close-info').click();
  if (e.key === '+' || e.key === '=') zoomBy(1.3);
  if (e.key === '-') zoomBy(1/1.3);
});

/* === 啟動 === */
buildMap();
setTimeout(() => showHint('點擊任一里查看里長/議員/介紹', 3500), 600);

/* ===========================================================
 * PWA: 註冊 service worker + 安裝橫幅
 * =========================================================== */
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  showInstallBanner('android');
});

window.addEventListener('appinstalled', () => {
  hideInstallBanner();
  deferredInstallPrompt = null;
  showHint('已安裝到主畫面 — 之後可離線使用', 3000);
});

function showInstallBanner(kind){
  if (sessionStorage.getItem('install-banner-dismissed')) return;
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  if (window.navigator.standalone === true) return;  // iOS already installed

  const div = document.createElement('div');
  div.id = 'install-banner';
  div.innerHTML = kind === 'ios'
    ? '<span>📲 加到主畫面後可離線使用 →</span>' +
      '<span class="ios-hint">點下方「分享 ⬆」→「加入主畫面」</span>' +
      '<button id="bn-close">×</button>'
    : '<span>📲 加到主畫面 (離線可用)</span>' +
      '<button id="bn-install">安裝</button>' +
      '<button id="bn-close">×</button>';
  document.body.appendChild(div);
  const close = () => {
    div.remove();
    sessionStorage.setItem('install-banner-dismissed','1');
  };
  document.getElementById('bn-close').addEventListener('click', close);
  const inst = document.getElementById('bn-install');
  if (inst) inst.addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    if (outcome === 'accepted') close();
  });
}
function hideInstallBanner(){
  const b = document.getElementById('install-banner');
  if (b) b.remove();
}

// iOS 沒 beforeinstallprompt 事件,自己偵測一次性顯示
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.navigator.standalone === true ||
                     window.matchMedia('(display-mode: standalone)').matches;
if (isIOS && !isStandalone){
  setTimeout(() => showInstallBanner('ios'), 3500);
}

// 註冊 service worker
if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => {
        console.log('SW registered, scope:', reg.scope);
      })
      .catch((err) => console.warn('SW failed:', err));
  });
}
